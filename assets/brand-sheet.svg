<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">納品物イメージ ブランド整理PDF</title>
  <desc id="desc">ブランド整理PDF全6ページの納品イメージ。現状整理、届ける相手、ブランドの魅力、Instagramでの見せ方、LP・商品ページ、次にやることを整理する構成です。</desc>
  <defs>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#5f5549" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="pageFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf9"/>
      <stop offset="1" stop-color="#f6efe7"/>
    </linearGradient>
    <linearGradient id="pageHead" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f2e8dc"/>
      <stop offset="1" stop-color="#fffaf4"/>
    </linearGradient>
    <style>
      .bg{fill:#fffdf9}
      .frame{fill:none;stroke:#eee4d8}
      .mainTitle{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:70px;font-weight:700;letter-spacing:.16em;fill:#2f2d2a}
      .subTitle{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:34px;font-weight:700;letter-spacing:.14em;fill:#b79c78}
      .lead{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-size:21px;letter-spacing:.05em;fill:#3c3934}
      .page{fill:url(#pageFill);stroke:#e3d7ca;stroke-width:1.5;filter:url(#softShadow)}
      .pageTop{fill:url(#pageHead)}
      .circle{fill:#b79c78}
      .num{font-family:Georgia,serif;font-size:26px;font-weight:700;fill:#fff}
      .pageTitle{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:21px;font-weight:700;letter-spacing:.04em;fill:#2f2d2a}
      .pageNo{font-family:Georgia,serif;font-size:17px;fill:#5c554c}
      .label{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-size:15px;font-weight:700;fill:#403b35;dominant-baseline:middle;alignment-baseline:middle}
      .note{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-size:13px;fill:#756d64}
      .softBox{fill:#fffaf4;stroke:#eadfd2;stroke-width:1.2}
      .accentBox{fill:#f2e8dc}
      .line{stroke:#d7ccbe;stroke-width:1.6;stroke-linecap:round}
      .thinLine{stroke:#e3d9ce;stroke-width:1.2;stroke-linecap:round}
      .icon{fill:none;stroke:#b79c78;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .iconFill{fill:#c8b59b}
      .footer{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:28px;letter-spacing:.08em;fill:#2f2d2a}
    </style>
  </defs>

  <rect class="bg" width="1400" height="980" rx="24"/>
  <rect class="frame" x="1" y="1" width="1398" height="978" rx="24"/>

  <text class="mainTitle" x="700" y="90" text-anchor="middle">納品物イメージ</text>
  <text class="subTitle" x="700" y="150" text-anchor="middle">ブランド整理PDF（全6枚）</text>
  <text class="lead" x="700" y="204" text-anchor="middle">売り出す前に、言葉・見せ方・見てもらう順番を整理します。</text>

  <!-- Page 1 -->
  <g transform="translate(72 250)">
    <rect class="page" width="392" height="260" rx="12"/>
    <rect class="pageTop" width="392" height="58" rx="12"/>
    <circle class="circle" cx="34" cy="30" r="18"/>
    <text class="num" x="34" y="39" text-anchor="middle">1</text>
    <text class="pageTitle" x="66" y="38">現状整理シート</text>
    <text class="pageNo" x="335" y="38">p.01</text>
    <g transform="translate(24 82)">
      <rect class="softBox" width="344" height="42" rx="7"/>
      <path class="icon" d="M22 12h28v22H22zM29 12c-8-10 8-16 13 0M43 12c8-10-8-16-13 0M36 12v22"/>
      <text class="label" x="88" y="21">商品・サービスの概要</text>
      <rect class="softBox" y="58" width="344" height="42" rx="7"/>
      <path class="icon" d="M20 79c0-10 12-18 28-18s28 8 28 18-12 18-28 18c-6 0-11-1-16-4l-12 4 4-10c-3-2-4-5-4-8z"/>
      <text class="label" x="88" y="79">今の悩み・迷い</text>
      <rect class="softBox" y="116" width="344" height="42" rx="7"/>
      <path class="icon" d="M22 132l25-10 11 11-10 25-27 8-7-7zM47 123l10 10"/>
      <text class="label" x="88" y="137">ブランド名・印象</text>
    </g>
  </g>

  <!-- Page 2 -->
  <g transform="translate(504 250)">
    <rect class="page" width="392" height="260" rx="12"/>
    <rect class="pageTop" width="392" height="58" rx="12"/>
    <circle class="circle" cx="34" cy="30" r="18"/>
    <text class="num" x="34" y="39" text-anchor="middle">2</text>
    <text class="pageTitle" x="66" y="38">届ける相手の整理</text>
    <text class="pageNo" x="335" y="38">p.02</text>
    <g transform="translate(24 82)">
      <rect class="softBox" width="344" height="72" rx="7"/>
      <circle class="iconFill" cx="34" cy="28" r="11"/>
      <path class="iconFill" d="M15 59c5-18 33-18 39 0z"/>
      <text class="label" x="92" y="36">届けたい相手</text>
      <line class="line" x1="92" y1="48" x2="310" y2="48"/>
      <rect class="softBox" y="94" width="344" height="72" rx="7"/>
      <path class="iconFill" d="M34 130c-20-15 2-37 17-16 15-21 37 1 17 16l-17 16z"/>
      <text class="label" x="92" y="130">相手の悩み</text>
      <line class="line" x1="92" y1="144" x2="310" y2="144"/>
    </g>
  </g>

  <!-- Page 3 -->
  <g transform="translate(936 250)">
    <rect class="page" width="392" height="260" rx="12"/>
    <rect class="pageTop" width="392" height="58" rx="12"/>
    <circle class="circle" cx="34" cy="30" r="18"/>
    <text class="num" x="34" y="39" text-anchor="middle">3</text>
    <text class="pageTitle" x="66" y="38">魅力と言葉の整理</text>
    <text class="pageNo" x="335" y="38">p.03</text>
    <g transform="translate(24 82)">
      <rect class="softBox" width="344" height="42" rx="7"/>
      <path class="icon" d="M20 22l15-15h34l15 15-32 31zM20 22h64M35 7l17 46M69 7L52 53"/>
      <text class="label" x="96" y="21">選ばれる理由</text>
      <rect class="softBox" y="58" width="344" height="42" rx="7"/>
      <path class="icon" d="M49 65c2 16 9 24 25 26-16 2-23 10-25 26-2-16-10-24-26-26 16-2 24-10 26-26z"/>
      <text class="label" x="96" y="79">伝える魅力</text>
      <rect class="softBox" y="116" width="344" height="42" rx="7"/>
      <path class="icon" d="M25 151l38-38 13 13-38 38-20 6zM57 119l13 13"/>
      <text class="label" x="96" y="137">プロフィール・説明文</text>
    </g>
  </g>

  <!-- Page 4 -->
  <g transform="translate(72 550)">
    <rect class="page" width="392" height="292" rx="12"/>
    <rect class="pageTop" width="392" height="58" rx="12"/>
    <circle class="circle" cx="34" cy="30" r="18"/>
    <text class="num" x="34" y="39" text-anchor="middle">4</text>
    <text class="pageTitle" x="66" y="38">Instagramの見せ方</text>
    <text class="pageNo" x="335" y="38">p.04</text>
    <g transform="translate(24 82)">
      <rect class="softBox" width="204" height="52" rx="7"/>
      <circle class="iconFill" cx="28" cy="25" r="10"/>
      <text class="label" x="70" y="26">プロフィール文</text>
      <rect class="softBox" y="70" width="204" height="52" rx="7"/>
      <rect class="iconFill" x="20" y="87" width="18" height="18" rx="3"/>
      <text class="label" x="70" y="96">投稿テーマ</text>
      <rect class="softBox" y="140" width="204" height="52" rx="7"/>
      <path class="iconFill" d="M22 154h18v36l-9-8-9 8z"/>
      <text class="label" x="70" y="166">ハイライト案</text>
      <g transform="translate(248 8)">
        <rect x="0" y="0" width="88" height="184" rx="20" fill="#fff" stroke="#5a5148" stroke-width="4"/>
        <rect x="30" y="8" width="28" height="5" rx="2" fill="#5a5148"/>
        <circle class="iconFill" cx="24" cy="45" r="11"/>
        <line class="thinLine" x1="43" y1="40" x2="70" y2="40"/>
        <line class="thinLine" x1="43" y1="54" x2="66" y2="54"/>
        <circle fill="#eadfd2" cx="23" cy="88" r="14"/>
        <circle fill="#eadfd2" cx="45" cy="88" r="14"/>
        <circle fill="#eadfd2" cx="67" cy="88" r="14"/>
        <rect fill="#f0e7dc" x="13" y="120" width="27" height="27"/>
        <rect fill="#f0e7dc" x="49" y="120" width="27" height="27"/>
        <rect fill="#f0e7dc" x="13" y="154" width="27" height="20"/>
        <rect fill="#f0e7dc" x="49" y="154" width="27" height="20"/>
      </g>
    </g>
  </g>

  <!-- Page 5 -->
  <g transform="translate(504 550)">
    <rect class="page" width="392" height="292" rx="12"/>
    <rect class="pageTop" width="392" height="58" rx="12"/>
    <circle class="circle" cx="34" cy="30" r="18"/>
    <text class="num" x="34" y="39" text-anchor="middle">5</text>
    <text class="pageTitle" x="66" y="38">LP・商品ページ</text>
    <text class="pageNo" x="335" y="38">p.05</text>
    <g transform="translate(24 82)">
      <rect class="softBox" width="344" height="188" rx="8"/>
      <g transform="translate(22 24)">
        <circle class="circle" cx="12" cy="12" r="12"/><text class="num" x="12" y="19" font-size="15" text-anchor="middle">1</text><text class="label" x="42" y="12">共感・導入</text><line class="line" x1="158" y1="12" x2="292" y2="12"/>
        <circle class="circle" cx="12" cy="52" r="12"/><text class="num" x="12" y="59" font-size="15" text-anchor="middle">2</text><text class="label" x="42" y="52">魅力・価値</text><line class="line" x1="158" y1="52" x2="292" y2="52"/>
        <circle class="circle" cx="12" cy="92" r="12"/><text class="num" x="12" y="99" font-size="15" text-anchor="middle">3</text><text class="label" x="42" y="92">具体的な内容</text><line class="line" x1="158" y1="92" x2="292" y2="92"/>
        <circle class="circle" cx="12" cy="132" r="12"/><text class="num" x="12" y="139" font-size="15" text-anchor="middle">4</text><text class="label" x="42" y="132">相談・購入まで</text><line class="line" x1="158" y1="132" x2="292" y2="132"/>
      </g>
    </g>
  </g>

  <!-- Page 6 -->
  <g transform="translate(936 550)">
    <rect class="page" width="392" height="292" rx="12"/>
    <rect class="pageTop" width="392" height="58" rx="12"/>
    <circle class="circle" cx="34" cy="30" r="18"/>
    <text class="num" x="34" y="39" text-anchor="middle">6</text>
    <text class="pageTitle" x="66" y="38">次にやること</text>
    <text class="pageNo" x="335" y="38">p.06</text>
    <g transform="translate(24 82)">
      <rect class="softBox" width="344" height="58" rx="7"/>
      <path class="iconFill" d="M22 15h8v34h-8zM30 17c20-11 39 11 62-1v27c-23 13-42-10-62 1z"/>
      <text class="label" x="112" y="29">今すぐ整えること</text>
      <line class="line" x1="112" y1="42" x2="310" y2="42"/>
      <rect class="softBox" y="74" width="344" height="58" rx="7"/>
      <path class="iconFill" d="M23 91l37 22-37 22z"/>
      <text class="label" x="112" y="103">次に作るもの</text>
      <line class="line" x1="112" y1="116" x2="310" y2="116"/>
      <rect class="softBox" y="148" width="344" height="58" rx="7"/>
      <rect class="iconFill" x="24" y="177" width="8" height="18"/>
      <rect class="iconFill" x="39" y="166" width="8" height="29"/>
      <rect class="iconFill" x="54" y="154" width="8" height="41"/>
      <text class="label" x="112" y="177">優先順位</text>
      <line class="line" x1="112" y1="190" x2="310" y2="190"/>
    </g>
  </g>

  <g transform="translate(512 912)">
    <circle cx="30" cy="0" r="28" fill="#f0e7dc"/>
    <path class="icon" d="M18-16h21l11 11v36H18zM39-16v13h11M25 6h18M25 17h18"/>
    <text class="footer" x="84" y="10">納品形式：PDF / 6ページ</text>
  </g>
</svg>
